---
name: Internal - Main - Continuous Integration

on:
  push:
    branches: [main]
    tags: ["*"]

  workflow_dispatch:

  schedule:
    - cron: "25 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean:
    uses: hoverkraft-tech/ci-github-container/.github/workflows/prune-pull-requests-images-tags.yml@2b647ed6f11d50cb6beb6d56333e68ba2c804826 # 0.33.1
    permissions:
      contents: read
      packages: write
      pull-requests: read
    with:
      images: '["cli"]'

  ci:
    uses: ./.github/workflows/__shared-ci.yml
    permissions:
      actions: read
      contents: read
      id-token: write
      issues: read
      packages: write
      pull-requests: write
      security-events: write
      statuses: write
    secrets: inherit
    with:
      sign-images: true

  npm-publish:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: hoverkraft-tech/ci-github-nodejs/actions/setup-node@47891dc49a31209a88949e081d97a010f8cd20c4 # 0.23.2

      - id: download-package-tarball
        name: Download package tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.ci.outputs.package-tarball-artifact-id }}
          path: ${{ runner.temp }}/${{ github.run_id }}
          skip-decompress: true

      - name: Publish CLI to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_TARBALL_DOWNLOAD_PATH: ${{ steps.download-package-tarball.outputs.download-path }}
          TAG: ${{ format('@ci-dokumentor/cli@{0}', github.ref_name) }}
        run: |
          PACKAGE_TARBALL_PATH="$(find "${PACKAGE_TARBALL_DOWNLOAD_PATH}" -maxdepth 2 -type f -name '*.tgz' | head -n 1)"

          if [ -z "${PACKAGE_TARBALL_PATH}" ]; then
            echo "Package tarball not found in ${PACKAGE_TARBALL_DOWNLOAD_PATH}" >&2
            exit 1
          fi

          # Write .npmrc file
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

          npm publish "${PACKAGE_TARBALL_PATH}" --provenance --access public --tag "${TAG}"

  docs:
    if: github.event_name != 'schedule'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.ci.outputs.build-artifact-id }}
          path: /

      - id: generate-readme
        uses: ./
        with:
          ci-dokumentor-version: ${{ needs.ci.outputs.image-tag }}
          source: action.yml
          exclude-sections: header,overview,usage,inputs,outputs,secrets
          extra-badges: |
            [
              {
                "label": "Total Downloads",
                "url": "https://img.shields.io/npm/dm/@ci-dokumentor/cli",
                "linkUrl": "https://www.npmjs.com/package/@ci-dokumentor/cli"
              },
              {
                "label": "Coverage Status",
                "url": "https://codecov.io/gh/hoverkraft-tech/ci-dokumentor/branch/main/graph/badge.svg",
                "linkUrl": "https://codecov.io/gh/hoverkraft-tech/ci-dokumentor"
              },
              {
                "label": "Continuous Integration",
                "url": "https://github.com/hoverkraft-tech/ci-dokumentor/actions/workflows/main-ci.yml/badge.svg",
                "linkUrl": "https://github.com/hoverkraft-tech/ci-dokumentor/actions/workflows/main-ci.yml"
              }
            ]
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: generate-docs
        uses: ./
        with:
          ci-dokumentor-version: ${{ needs.ci.outputs.image-tag }}
          source: action.yml
          destination: packages/docs/content/integrations/github-action.md
          exclude-sections: header,badges,overview,contributing,security,license,generated
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format-link: full

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          client-id: ${{ vars.CI_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

      - uses: hoverkraft-tech/ci-github-common/actions/create-and-merge-pull-request@4c9d51717dc04d823dac2dc9ac2857e7b3069454 # 0.35.0
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          branch: docs/action-documentation-update
          title: "docs: update action documentation"
          body: Update action documentation
          commit-message: |
            docs: update action documentation

            [skip ci]

      - name: Deploy to GitHub Pages
        id: deployment
        uses: hoverkraft-tech/ci-github-publish/actions/deploy/github-pages@2c8e24b416226074aea1e240468f043edefc5760 # 0.23.2
        with:
          build-path: packages/docs/build
